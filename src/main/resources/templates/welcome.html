<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
</head>
<body>
<h2>Chào mừng đến với Personal Todo App</h2>

<div th:if="${error}" th:text="${error}" style="color: red;"></div>

<form th:action="@{/welcome}" method="post">
    <label>Tên chủ sở hữu:</label>
    <input type="text" name="ownerName" placeholder="Nhập tên của bạn..." />
    <button type="submit">Bắt đầu</button>
</form>
</body>
</html>
