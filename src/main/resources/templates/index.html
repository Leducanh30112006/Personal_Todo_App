<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Todo</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<h2>Danh sách Ghi chú Cá nhân</h2>
<a th:href="@{/add}">+ Thêm Ghi chú mới</a>
<br><br>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nội dung</th>
        <th>Hạn chót</th>
        <th>Trạng thái</th>
        <th>Độ ưu tiên</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${todo.dueDate}"></td>
        <td th:text="${todo.status}"></td>
        <td th:text="${todo.priority}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
