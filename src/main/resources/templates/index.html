<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h2>Danh sách Ghi chú Cá nhân</h2>

<div th:if="${message}" th:text="${message}" style="color: green; font-weight: bold; margin-bottom: 15px;"></div>

<a th:href="@{/add}">+ Thêm Ghi chú mới</a>
<br><br>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nội dung</th>
        <th>Hạn chót</th>
        <th>Trạng thái</th>
        <th>Độ ưu tiên</th>
        <th>Hành động</th> </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${todo.dueDate}"></td>
        <td th:text="${todo.status}"></td>
        <td th:text="${todo.priority}"></td>
        <td>
            <a th:href="@{/edit/{id}(id=${todo.id})}">Sửa</a> |

            <a th:href="@{/delete/{id}(id=${todo.id})}"
               onclick="return confirm('Bạn có chắc chắn muốn xóa task này không?');"
               style="color: red;">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
