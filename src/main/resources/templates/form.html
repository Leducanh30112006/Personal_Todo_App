<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{app.title}">Personal Todo App</title>
  <style>
    .form-group { margin-bottom: 15px; }
    .error { color: red; font-size: 0.85em; display: block; margin-top: 5px; }
    .container { width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
    label { font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <h2 th:text="${todo.id == null} ? #{btn.add} : #{btn.edit}">Tiêu đề Form</h2>

  <form th:action="@{/add}" th:object="${todo}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
      <label th:text="#{table.content}">Nội dung</label>
      <input type="text" th:field="*{content}" />
      <span class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
    </div>

    <div class="form-group">
      <label th:text="#{table.dueDate}">Hạn chót</label>
      <input type="date" th:field="*{dueDate}" />
      <span class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></span>
    </div>

    <div class="form-group">
      <label th:text="#{table.status}">Trạng thái</label>
      <select th:field="*{status}">
        <option value="Chưa bắt đầu">Chưa bắt đầu</option>
        <option value="Đang thực hiện">Đang thực hiện</option>
        <option value="Hoàn thành">Hoàn thành</option>
      </select>
    </div>

    <div class="form-group">
      <label th:text="#{table.priority}">Độ ưu tiên</label>
      <select th:field="*{priority}">
        <option value="Cao">Cao</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Thấp">Thấp</option>
      </select>
    </div>

    <div style="display: flex; gap: 10px;">
      <button type="submit" th:text="#{btn.edit}"></button>
      <a th:href="@{/}" style="text-decoration: none; padding-top: 10px;">Quay lại</a>
    </div>
  </form>
</div>
</body>
</html>
